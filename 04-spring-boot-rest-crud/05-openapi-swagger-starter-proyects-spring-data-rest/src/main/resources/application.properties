spring.application.name=cruddemo

# ==========================================
# Configuración de Conexión a MS SQL Server
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=EMPLOYEE_DIRECTORY;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=FYLQyuxzcT40TJoC
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# Configuración de Hibernate / JPA
# ==========================================
# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# Logging
# ==========================================
logging.level.root=warn
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace

# ==========================================
# Configuración de Spring Data REST
# ==========================================
spring.data.rest.base-path=/api
# spring.data.rest.default-page-size=5

# ==========================================
# Configuración de OpenAPI / Swagger
# ==========================================
springdoc.swagger-ui.path=/employee-API
springdoc.api-docs.path=/employee-API-docs

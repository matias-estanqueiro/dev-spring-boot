<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Confirmation</title>
</head>
<body>
    <h1>Student Confirmation</h1>
    <p>First Name: <span th:text="${student.firstName}"></span></p>
    <p>Last Name: <span th:text="${student.lastName}"></span></p>
    <p>Country: <span th:text="${student.country}"></span></p>
    <p>Favorite Language: <span th:text="${student.programmingLanguage}"></span></p>
    <p>Operating Systems:</p>
    <ul>
        <li th:each="os : ${student.operatingSystems}" th:text="${os}"></li>
    </ul>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Customer Form</title>
</head>
<body>
    <i> Fill out the form. Asterisk (*) indicates required fields.</i>
    <form th:action="@{/processForm}" th:object="${customer}" method="POST" class="max-w-md mx-auto mt-10">
        <div class="mb-4">
            <label for="firstName" class="block text-gray-700">First Name:</label>
            <input type="text" id="firstName" th:field="*{firstName}" class="w-full px-3 py-2 border rounded">
            <div th:if="${#fields.hasErrors('firstName')}" class="text-red-500 text-sm mt-1">
                <p th:each="err : ${#fields.errors('firstName')}" th:text="${err}"></p>
            </div>
        </div>

        <div class="mb-4">
            <label for="lastName" class="block text-gray-700">Last Name (*):</label>
            <input type="text" id="lastName" th:field="*{lastName}" class="w-full px-3 py-2 border rounded">
            <div th:if="${#fields.hasErrors('lastName')}" class="text-red-500 text-sm mt-1">
                <p th:each="err : ${#fields.errors('lastName')}" th:text="${err}"></p>
            </div>
        </div>

        <div class="mb-4">
            <label for="freePasses" class="block text-gray-700">Free Passes:</label>
            <input type="text" id="freePasses" th:field="*{freePasses}" class="w-full px-3 py-2 border rounded">
            <div th:if="${#fields.hasErrors('freePasses')}" class="text-red-500 text-sm mt-1">
                <p th:each="err : ${#fields.errors('freePasses')}" th:text="${err}"></p>
            </div>
        </div>

        <div class="mb-4">
            <label for="postalCode" class="block text-gray-700">Postal Code:</label>
            <input type="text" id="postalCode" th:field="*{postalCode}" class="w-full px-3 py-2 border rounded">
            <div th:if="${#fields.hasErrors('postalCode')}" class="text-red-500 text-sm mt-1">
                <p th:each="err : ${#fields.errors('postalCode')}" th:text="${err}"></p>
            </div>
        </div>

        <div class="mb-4">
            <label for="courseCode" class="block text-gray-700">Course Code:</label>
            <input type="text" id="courseCode" th:field="*{courseCode}" class="w-full px-3 py-2 border rounded">
            <div th:if="${#fields.hasErrors('courseCode')}" class="text-red-500 text-sm mt-1">
                <p th:each="err : ${#fields.errors('courseCode')}" th:text="${err}"></p>
            </div>
        </div>

        <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Submit</button>
</body>
</html>

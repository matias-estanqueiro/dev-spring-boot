<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Employee Directory</title>
</head>
<body>
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Employee Directory</h1>
    <hr class="mb-6 border-gray-300">

    <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mb-4">
        <a th:href="@{/employees/showFormForAdd}">Add Employee</a>
    </button>
    
    <table class="min-w-full bg-white border border-gray-400">
        <thead>
            <tr class="bg-black text-white text-left">
                <th class="py-2 px-4 border-b border-gray-200">Last Name</th>
                <th class="py-2 px-4 border-b border-gray-200">First Name</th>
                <th class="py-2 px-4 border-b border-gray-200">Email</th>
                <th class="py-2 px-4 border-b border-gray-200">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="employee : ${employees}">
                <td class="py-2 px-4 border-b border-gray-200" th:text="${employee.lastName}"></td>
                <td class="py-2 px-4 border-b border-gray-200" th:text="${employee.firstName}"></td>
                <td class="py-2 px-4 border-b border-gray-200" th:text="${employee.email}"></td>
                <td class="py-2 px-4 border-b border-gray-200">
                    <a class="text-white font-bold hover:bg-blue-700 border px-3 py-1 rounded bg-blue-500" th:href="@{/employees/showFormForUpdate(id=${employee.id})}">Edit</a>
                    <a class="text-white font-bold hover:bg-red-700 ml-4 border px-3 py-1 rounded bg-red-500" th:href="@{/employees/delete(id=${employee.id})}" onclick="if(!(confirm('Are you sure you want to delete the employee?'))) return false">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>

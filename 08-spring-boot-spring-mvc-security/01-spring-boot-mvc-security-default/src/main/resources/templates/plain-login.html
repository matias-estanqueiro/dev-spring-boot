<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login Company</title>
</head>
<body>
    <div class="max-w-md mx-auto mt-10">
        <h2 class="text-2xl font-bold mb-6 text-center">Login to Company</h2>
        <form action="#"  th:action="@{/authenticateTheUser}" method="POST" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <!-- Error Messages -->
            <div th:if="${param.error}" class="mb-4 text-white text-sm font-bold px-3 py-2 border border-red-500 rounded bg-red-500">
                Invalid username or password.
            </div>

            <!-- Loguot Message -->
            <div th:if="${param.logout}" class="mb-4 text-white text-sm font-bold px-3 py-2 border border-green-500 rounded bg-green-500">
                You have been logged out successfully.
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">Username</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="username" name="username" type="text" placeholder="Username">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" id="password" name="password" type="password" placeholder="**********">
            </div>
            <div class="flex items-center justify-between">
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">Sign In</button>
            </div>
        </form>
    </div>

</body>
</html>
